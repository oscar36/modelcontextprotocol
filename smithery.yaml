# Smithery configuration file: https://smithery.ai/docs/build/project-config

build:
  dockerBuildPath: perplexity-ask
startCommand:
  type: stdio
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { PERPLEXITY_API_KEY: config.perplexityApiKey } })
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - perplexityApiKey
    properties:
      perplexityApiKey:
        type: string
        description: Perplexity Sonar API key
  exampleConfig:
    perplexityApiKey: sk-abcdef1234567890
